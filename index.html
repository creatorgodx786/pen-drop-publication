        /* Modern Reset and Logo-Derived Color Variables */
        :root {
            --brand-navy: #081a3e;       /* Base foundation color from the pen body */

            --brand-cyan: #00bfff;       /* Bright electric accent cyan */
            --brand-magenta: #e6006f;    /* Vivid creative splash pink/magenta */
            --brand-bronze: #8c532b;     /* Deep elegant text brown from the logo typography */
            --bg-light: #ffffff;
            --border-color: #f0e6df;     /* Subtle warm border pairing with the bronze */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-light);
            color: #222222;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Top Announcement Notification Bar with Color Splash Gradient */
        .announcement-bar {
            background: linear-gradient(90deg, var(--brand-navy), var(--brand-magenta), var(--brand-orange));
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 10px 20px;
        }

        /* Executive Header and Sticky Navigation */
        header {
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(8, 26, 62, 0.02);
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            text-decoration: none;
        }

        .logo-main {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--brand-bronze);
            line-height: 1.1;
        }

        .logo-sub {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            letter-spacing: 4px;
            color: var(--brand-bronze);
            font-weight: 600;
            margin-top: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
        }

        nav ul li {
            margin-left: 35px;
        }

        nav ul li a {
            color: var(--brand-navy);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            padding-bottom: 4px;
        }

        /* Interactive Menu Underline Expand Animation */
        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--brand-cyan), var(--brand-magenta));
            transition: width 0.3s ease, left 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
            left: 0;
        }

        /* Corporate Split Hero Section with Fade-In Scroll Writing Style */
        .hero-split {
            display: flex;
            min-height: 75vh;
            background-color: #fafbfc;
            align-items: center;
        }

        .hero-text-block {
            flex: 1;
            padding: 80px 100px;
            max-width: 700px;
            animation: elegantFadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .hero-text-block h1 {
            font-family: 'Cinzel', serif;
            font-size: 44px;
            color: var(--brand-navy);
            line-height: 1.25;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .hero-text-block h1 span {
            color: var(--brand-orange);
            font-weight: 700;
        }

        .hero-text-block p {
            font-size: 15px;
            color: #555555;
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.8;
        }
