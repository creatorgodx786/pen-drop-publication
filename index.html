<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Drop Publication | Independent Literary Excellence</title>
    
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Modern Reset and Logo-Derived Color Variables */
        :root {
            --brand-navy: #081a3e;       
            --brand-orange: #ff5500;     
            --brand-cyan: #00bfff;       
            --brand-magenta: #e6006f;    
            --brand-bronze: #8c532b;     
            --bg-light: #ffffff;
            --border-color: #f0e6df;     
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-light);
            color: #222222;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            cursor: none; /* Disables standard cursor for the elegant ink droplet trail */
        }

        /* --- INK DROPLT TRAIL CURSOR DESIGN --- */
        .ink-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background-color: var(--brand-navy);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
        }

        .ink-splash-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
            opacity: 0.8;
        }

        /* Top Announcement Notification Bar */
        .announcement-bar {
            background: linear-gradient(90deg, var(--brand-navy), var(--brand-magenta), var(--brand-orange));
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 10px 20px;
        }

        /* Header Navigation Styles configured to blend seamlessly with pure white backgrounds */
        header {
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
            background-color: #ffffff;
        }

        /* Forces any off-white backgrounds around the logo to dissolve into pure white */
        .header-logo-icon {
            width: 50px;
            height: 50px;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 2px;
            color: var(--brand-bronze);
            line-height: 1.1;
        }

        .logo-sub {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--brand-bronze);
            font-weight: 600;
            margin-top: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
        }

        nav ul li {
            margin-left: 35px;
        }

        nav ul li a {
            color: var(--brand-navy);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            padding-bottom: 4px;
            cursor: none;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--brand-cyan), var(--brand-magenta));
            transition: width 0.3s ease, left 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
            left: 0;
        }

        /* Pure White Layout for Entire Hero Display */
        .hero-split {
            display: flex;
            min-height: 80vh;
            background-color: #ffffff;
            align-items: center;
        }

        .hero-text-block {
            flex: 1;
            padding: 60px 80px;
            max-width: 650px;
            animation: elegantFadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .hero-text-block h1 {
            font-family: 'Cinzel', serif;
            font-size: 44px;
            color: var(--brand-navy);
            line-height: 1.25;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .hero-text-block h1 span {
            color: var(--brand-orange);
            font-weight: 700;
        }

        .hero-text-block p {
            font-size: 15px;
            color: #555555;
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.8;
        }
